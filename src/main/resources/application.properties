spring.application.name=ecommerce-backend

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=ShreyasKadam@3006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT (override via env: JWT_SECRET, JWT_EXPIRATION_MS)
app.jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Seed default admin on startup (change in production)
app.admin.email=${ADMIN_EMAIL:admin@ecommerce.com}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.full-name=${ADMIN_FULL_NAME:System Admin}

server.port=8080
