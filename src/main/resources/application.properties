spring.application.name=ecommerce-backend

# MySQL — set secrets via environment variables (never commit real passwords)
# Required: DB_PASSWORD
# Optional: DB_URL, DB_USERNAME
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT — set JWT_SECRET in the environment for any shared/deployed environment
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Seed default admin on startup
app.admin.email=${ADMIN_EMAIL:admin@ecommerce.com}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}
app.admin.full-name=${ADMIN_FULL_NAME:System Admin}

server.port=8080
